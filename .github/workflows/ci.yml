name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest tests/test_suite.py -v

      - name: Verify task file generation
        run: |
          python tasks/banking_reserve/generate_task_files.py
          python tasks/sales_revenue/generate_task_files.py

      - name: Verify grading (oracle vs oracle)
        run: |
          python tasks/banking_reserve/grade.py \
            tasks/banking_reserve/oracle/expected_reserves.ods \
            tasks/banking_reserve/oracle/expected_reserves.ods
          python tasks/sales_revenue/grade.py \
            tasks/sales_revenue/oracle/expected_revenue.ods \
            tasks/sales_revenue/oracle/expected_revenue.ods

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker compose build
